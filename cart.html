<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #4a90e2, #8e44ad);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .cart-container {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 950px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }
    h2 {
      color: #8e44ad;
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
    }
    .table thead {
      background: #4a90e2;
      color: #fff;
      border-radius: 10px;
    }
    .table tbody tr:hover {
      background: rgba(142, 68, 173, 0.1);
      transition: 0.3s;
    }
    .btn-danger {
      background: #e74c3c;
      border: none;
      transition: all 0.3s;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .summary-card {
      background: linear-gradient(135deg, #4a90e2, #8e44ad);
      color: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }
    .summary-card h5 {
      font-weight: bold;
    }
    .summary-card .btn {
      background: #27ae60;
      border: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .summary-card .btn:hover {
      background: #1e8449;
    }
  </style>
</head>
<body>

  <div class="cart-container">
    <h2>🛒 Your Shopping Cart</h2>

    <!-- Cart Table -->
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>Book</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Harry Potter Series</td>
            <td>₹3,499</td>
            <td><input type="number" class="form-control text-center" value="1" min="1" style="width:70px;"></td>
            <td>₹3,499</td>
            <td><button class="btn btn-danger btn-sm">Remove</button></td>
          </tr>
          <tr>
            <td>The Alchemist</td>
            <td>₹499</td>
            <td><input type="number" class="form-control text-center" value="2" min="1" style="width:70px;"></td>
            <td>₹998</td>
            <td><button class="btn btn-danger btn-sm">Remove</button></td>
          </tr>
          <tr>
            <td>Rich Dad Poor Dad</td>
            <td>₹399</td>
            <td><input type="number" class="form-control text-center" value="1" min="1" style="width:70px;"></td>
            <td>₹399</td>
            <td><button class="btn btn-danger btn-sm">Remove</button></td>
          </tr>
          <tr>
            <td>Wings of Fire</td>
            <td>₹299</td>
            <td><input type="number" class="form-control text-center" value="1" min="1" style="width:70px;"></td>
            <td>₹299</td>
            <td><button class="btn btn-danger btn-sm">Remove</button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Cart Summary -->
    <div class="d-flex justify-content-end mt-4">
      <div class="summary-card w-100 w-md-50">
        <h5>Order Summary</h5>
        <p class="mb-1">Subtotal: <span class="fw-bold">₹5,195</span></p>
        <p class="mb-1">Shipping: <span class="fw-bold">Free</span></p>
        <hr class="bg-light">
        <p class="fs-5">Total: <span class="fw-bold">₹5,195</span></p>
        <a href="checkout.html" class="btn btn-light w-100 mt-2">Proceed to Checkout</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

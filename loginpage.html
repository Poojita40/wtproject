<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #4a90e2, #8e44ad);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="card shadow-lg p-4 border-0">
    <h3 class="text-center text-primary mb-4"><i class="bi bi-person-circle"></i> Login</h3>
    <form>
      <div class="mb-3">
        <label class="form-label fw-bold"><i class="bi bi-person-fill"></i> Login ID</label>
        <input type="text" class="form-control" placeholder="Enter your ID" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold"><i class="bi bi-lock-fill"></i> Password</label>
        <input type="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i> Login</button>
        <button type="reset" class="btn btn-outline-dark mt-2"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
      </div>
    </form>
    <div class="text-center mt-3">
      <small>Don't have an account? <a href="register.html" target="_parent" class="text-decoration-none text-primary">Register here</a></small>
    </div>
  </div>
</body>
</html>

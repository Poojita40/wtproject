<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Book Store</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Online Book Store</a>
      <form class="d-flex ms-auto" role="search">
        <input class="form-control me-2" type="search" placeholder="Search books..." aria-label="Search">
        <button class="btn btn-light" type="submit">Search</button>
      </form>
    </div>
  </nav>

  <!-- Filter Section -->
  <div class="container my-4">
    <div class="row">
      <div class="col-md-3">
        <h5 class="fw-bold">Filter by Category</h5>
        <ul class="list-group">
          <li class="list-group-item active">All</li>
          <li class="list-group-item">Fiction</li>
          <li class="list-group-item">Non-Fiction</li>
          <li class="list-group-item">Educational</li>
          <li class="list-group-item">Children</li>
        </ul>
      </div>

      <!-- Products -->
      <div class="col-md-9">
        <h3 class="mb-3">Available Books</h3>
        <div class="row g-4">

          <!-- Book 1 -->
          <div class="col-sm-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img src="https://m.media-amazon.com/images/I/81gepf1eMqL._AC_UY327_FMwebp_QL65_.jpg" class="card-img-top" alt="Harry Potter">
              <div class="card-body text-center">
                <h5 class="card-title">Harry Potter Series</h5>
                <a href="cart.html" class="btn btn-primary w-100">Add to Cart</a>
              </div>
            </div>
          </div>

          <!-- Book 2 -->
          <div class="col-sm-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img src="https://m.media-amazon.com/images/I/71aFt4+OTOL._AC_UY327_FMwebp_QL65_.jpg" class="card-img-top" alt="The Alchemist">
              <div class="card-body text-center">
                <h5 class="card-title">The Alchemist</h5>
                <a href="cart.html" class="btn btn-primary w-100">Add to Cart</a>
              </div>
            </div>
          </div>

          <!-- Book 3 -->
          <div class="col-sm-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img src="https://m.media-amazon.com/images/I/81vpsIs58WL._AC_UY327_FMwebp_QL65_.jpg" class="card-img-top" alt="Rich Dad Poor Dad">
              <div class="card-body text-center">
                <h5 class="card-title">Rich Dad Poor Dad</h5>
                <a href="cart.html" class="btn btn-primary w-100">Add to Cart</a>
              </div>
            </div>
          </div>

          <!-- Book 4 -->
          <div class="col-sm-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img src="https://m.media-amazon.com/images/I/71kxa1-0mfL._AC_UY327_FMwebp_QL65_.jpg" class="card-img-top" alt="Wings of Fire">
              <div class="card-body text-center">
                <h5 class="card-title">Wings of Fire</h5>
                <a href="cart.html" class="btn btn-primary w-100">Add to Cart</a>
              </div>
            </div>
          </div>

          <!-- Book 5 -->
          <div class="col-sm-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img src="https://m.media-amazon.com/images/I/81-QB7nDh4L._AC_UY327_FMwebp_QL65_.jpg" class="card-img-top" alt="Think Like a Monk">
              <div class="card-body text-center">
                <h5 class="card-title">Think Like a Monk</h5>
                <a href="cart.html" class="btn btn-primary w-100">Add to Cart</a>
              </div>
            </div>
          </div>

          <!-- Book 6 -->
          <div class="col-sm-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img src="https://m.media-amazon.com/images/I/81bsw6fnUiL._AC_UY327_FMwebp_QL65_.jpg" class="card-img-top" alt="Atomic Habits">
              <div class="card-body text-center">
                <h5 class="card-title">Atomic Habits</h5>
                <a href="cart.html" class="btn btn-primary w-100">Add to Cart</a>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

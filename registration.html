<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #4a90e2, #8e44ad);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
    }
  </style>
</head>
<body>
  <div class="card shadow-lg">
    <div class="card-header bg-primary text-white text-center">
      <h2><i class="bi bi-person-plus-fill"></i> Registration</h2>
    </div>
    <div class="card-body p-4">
      <form>
        <div class="mb-3">
          <label class="form-label fw-bold"><i class="bi bi-person-fill"></i> Full Name</label>
          <input type="text" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold"><i class="bi bi-envelope-fill"></i> Email</label>
          <input type="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold"><i class="bi bi-telephone-fill"></i> Phone</label>
          <input type="tel" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold"><i class="bi bi-lock-fill"></i> Password</label>
          <input type="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold"><i class="bi bi-shield-lock-fill"></i> Confirm Password</label>
          <input type="password" class="form-control" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-success"><i class="bi bi-check-circle-fill"></i> Create Account</button>
        </div>
      </form>
      <p class="text-center mt-3">Already have an account?
        <a href="login.html" target="_parent" class="text-decoration-none">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
